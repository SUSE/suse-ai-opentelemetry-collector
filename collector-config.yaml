receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  prometheus:
    config:
      scrape_configs:
        - job_name: 'vllm'
          scrape_interval: 10s
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_label_app]
              action: keep
              regex: 'vllm'
            - source_labels: [__meta_kubernetes_pod_container_port_number]
              action: keep
              regex: '8000'

        - job_name: 'milvus'
          scrape_interval: 15s
          static_configs:
            - targets: ['milvus.suse-ai.svc.cluster.local:9091']

        - job_name: 'qdrant'
          scrape_interval: 15s
          static_configs:
            - targets: ['qdrant.suse-ai.svc.cluster.local:6333']

        - job_name: 'gpu-metrics'
          scrape_interval: 10s
          kubernetes_sd_configs:
            - role: endpoints
              namespaces:
                names:
                  - gpu-operator

  elasticsearch:
    endpoint: "http://opensearch.suse-ai.svc.cluster.local:9200"
    collection_interval: 15s

processors:
  memory_limiter:
    check_interval: 1s
    limit_percentage: 80
    spike_limit_percentage: 25

  resource_detection:
    # "k8s" is not a valid detector key; k8s pod/node metadata is added by
    # k8s_attributes. env picks up OTEL_RESOURCE_ATTRIBUTES, system the host.
    detectors: [env, system]

  k8s_attributes:
    auth_type: "serviceAccount"
    passthrough: false
    extract:
      metadata:
        - k8s.pod.name
        - k8s.pod.uid
        - k8s.namespace.name
        - k8s.deployment.name
        - k8s.statefulset.name
        - k8s.daemonset.name
        - k8s.cronjob.name
        - k8s.job.name
        - k8s.node.name

  transform:
    error_mode: ignore
    trace_statements:
      - context: span
        statements:
          # Normalization of legacy attributes to current GenAI semantic conventions
          - set(attributes["gen_ai.provider.name"], attributes["GenAiSystem"]) where attributes["GenAiSystem"] != nil and attributes["gen_ai.provider.name"] == nil
          - set(attributes["gen_ai.operation.name"], attributes["GenAiOperationName"]) where attributes["GenAiOperationName"] != nil
          - set(attributes["gen_ai.request.model"], attributes["GenAiRequestModel"]) where attributes["GenAiRequestModel"] != nil
          # Back-fill gen_ai.provider.name from the deprecated gen_ai.system attribute
          - set(attributes["gen_ai.provider.name"], attributes["gen_ai.system"]) where attributes["gen_ai.provider.name"] == nil and attributes["gen_ai.system"] != nil
          # Promotion of GenAI attributes to Resource level
          - set(resource.attributes["gen_ai.provider.name"], attributes["gen_ai.provider.name"]) where attributes["gen_ai.provider.name"] != nil
          # Aggregation of models (last one wins in this context, usually sufficient per trace segment)
          - set(resource.attributes["gen_ai.models"], attributes["gen_ai.request.model"]) where attributes["gen_ai.request.model"] != nil

    metric_statements:
      - context: datapoint
        statements:
          # Back-fill gen_ai.provider.name from the deprecated gen_ai.system attribute
          - set(attributes["gen_ai.provider.name"], attributes["gen_ai.system"]) where attributes["gen_ai.provider.name"] == nil and attributes["gen_ai.system"] != nil
          # Promotion of GenAI attributes to Resource level for metrics
          - set(resource.attributes["gen_ai.provider.name"], attributes["gen_ai.provider.name"]) where attributes["gen_ai.provider.name"] != nil
          # Promotion of DB identity to Resource level (db.system.name is the current key; fall back to deprecated db.system)
          - set(resource.attributes["db.system.name"], attributes["db.system.name"]) where attributes["db.system.name"] != nil
          - set(resource.attributes["db.system.name"], attributes["db.system"]) where resource.attributes["db.system.name"] == nil and attributes["db.system"] != nil
          # Handle vLLM metrics (explicitly NOT renaming vllm: as requested)

  resource:
    attributes:
      - key: service.namespace
        value: "suse-ai"
        action: upsert
      # Cluster identity from the deployment environment. k8sattributes cannot
      # provide k8s.cluster.name, so it is sourced from an env var.
      - key: k8s.cluster.name
        value: ${env:K8S_CLUSTER_NAME}
        action: insert
      # Standardize identity (first non-nil source wins via insert)
      - key: suse.ai.component
        from_attribute: gen_ai.provider.name
        action: insert
      - key: suse.ai.component
        from_attribute: db.system.name
        action: insert

  batch:
    send_batch_size: 1000
    timeout: 10s

exporters:
  debug:
    verbosity: basic
  otlp:
    endpoint: "suse-observability-otel-collector.observability.svc.cluster.local:4317"
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource_detection, k8s_attributes, transform, resource, batch]
      exporters: [debug, otlp]
    metrics:
      receivers: [otlp, prometheus, elasticsearch]
      processors: [memory_limiter, resource_detection, k8s_attributes, transform, resource, batch]
      exporters: [debug, otlp]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource_detection, k8s_attributes, transform, resource, batch]
      exporters: [debug, otlp]
